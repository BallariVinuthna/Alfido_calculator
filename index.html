<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Futuristic Smart Glass Calculator - A premium, high-end glassmorphism calculator with smooth animations and smart interactions.">
    <title>Smart Glass | Futuristic Calculator</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="Smart Glass | Futuristic Calculator">
    <meta property="og:description" content="A premium, high-end glassmorphism calculator with smooth animations and smart interactions.">
    <meta property="og:image" content="assets/preview.png">
    <meta property="og:type" content="website">
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="particles" id="particles"></div>
    </div>

    <!-- Custom Cursor Glow -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Main Container -->
    <main class="app-container d-flex flex-column align-items-center justify-content-center min-vh-100 p-3">
        
        <!-- Smart Header -->
        <header class="smart-header glass-panel mb-4 d-flex justify-content-between align-items-center px-4 py-2">
            <div class="header-left d-flex align-items-center">
                <i class="fas fa-microchip me-2 neon-text-cyan pulse"></i>
                <span class="system-status">SMART OS v2.0.4</span>
            </div>
            <div class="header-right d-flex align-items-center">
                <div id="digitalClock" class="digital-clock me-3">00:00:00</div>
                <button id="themeToggle" class="theme-toggle glass-btn" aria-label="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <!-- Calculator Card -->
        <div class="calculator-card glass-panel floating" id="calculator">
            <!-- Startup Overlay -->
            <div class="startup-screen" id="startupScreen">
                <div class="loader-content">
                    <div class="neon-circle"></div>
                    <span class="loading-text">INITIALIZING...</span>
                </div>
            </div>

            <!-- Display Section -->
            <div class="calc-display px-4 pt-4 pb-2">
                <div class="expression-row text-end mb-1" id="expressionDisplay"></div>
                <div class="result-row text-end" id="resultDisplay">0</div>
            </div>

            <!-- Smart Controls -->
            <div class="smart-indicators px-4 mb-3 d-flex gap-2">
                <span class="badge neon-badge-cyan">AI ACTIVE</span>
                <span class="badge neon-badge-purple">SECURE</span>
            </div>

            <!-- Keypad Section -->
            <div class="calc-keypad p-4">
                <div class="row g-3">
                    <div class="col-3"><button class="btn-calc btn-op" data-action="clear">AC</button></div>
                    <div class="col-3"><button class="btn-calc btn-op" data-action="delete"><i class="fas fa-backspace"></i></button></div>
                    <div class="col-3"><button class="btn-calc btn-op" data-value="%">%</button></div>
                    <div class="col-3"><button class="btn-calc btn-op-accent" data-value="/">÷</button></div>
                    
                    <div class="col-3"><button class="btn-calc" data-value="7">7</button></div>
                    <div class="col-3"><button class="btn-calc" data-value="8">8</button></div>
                    <div class="col-3"><button class="btn-calc" data-value="9">9</button></div>
                    <div class="col-3"><button class="btn-calc btn-op-accent" data-value="*">×</button></div>
                    
                    <div class="col-3"><button class="btn-calc" data-value="4">4</button></div>
                    <div class="col-3"><button class="btn-calc" data-value="5">5</button></div>
                    <div class="col-3"><button class="btn-calc" data-value="6">6</button></div>
                    <div class="col-3"><button class="btn-calc btn-op-accent" data-value="-">−</button></div>
                    
                    <div class="col-3"><button class="btn-calc" data-value="1">1</button></div>
                    <div class="col-3"><button class="btn-calc" data-value="2">2</button></div>
                    <div class="col-3"><button class="btn-calc" data-value="3">3</button></div>
                    <div class="col-3"><button class="btn-calc btn-op-accent" data-value="+">+</button></div>
                    
                    <div class="col-3"><button class="btn-calc" data-value="0">0</button></div>
                    <div class="col-3"><button class="btn-calc" data-value=".">.</button></div>
                    <div class="col-6"><button class="btn-calc btn-equal neon-glow-purple" data-action="calculate">=</button></div>
                </div>
            </div>
        </div>

        <!-- Smart Footer -->
        <footer class="smart-footer mt-4 d-flex align-items-center gap-3">
            <div class="ai-wave">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <span class="footer-msg">System Ready. Awaiting input...</span>
        </footer>
    </main>

    <!-- Bootstrap & Custom JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
